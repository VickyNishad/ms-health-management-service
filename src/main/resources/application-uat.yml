spring:
  application:
    name: ms-health-management-service

  datasource:
    url: jdbc:mysql://localhost:3306/medicquedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Root@123
    driver-class-name: com.mysql.cj.jdbc.Driver

#    hikari:
#      minimum-idle: 5
